<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fælleshus TV</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; overflow:hidden; }

#video { width:100%; height:85vh; border:none; }

#ticker {
  height:15vh;
  background:#111;
  font-size:32px;
  display:flex;
  align-items:center;
  overflow:hidden;
}

#ticker span {
  white-space:nowrap;
  animation: scroll 25s linear infinite;
}

@keyframes scroll {
  from { transform:translateX(100%); }
  to { transform:translateX(-100%); }
}
</style>
</head>

<body>

<iframe id="video" src="https://www.youtube.com/embed/ScMzIvxBSi4?autoplay=1&mute=1"></iframe>

<div id="ticker">
  <span>Velkommen til fælleshuset – vi ønsker jer en dejlig dag ☀️</span>
</div>

</body>
