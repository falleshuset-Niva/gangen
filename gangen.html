<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fælleshus TV</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; overflow:hidden; }

#topbar {
  position:absolute;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  font-size:20px;
}

#video {
  width:100%;
  height:85vh;
  border:none;
}

#ticker {
  height:15vh;
  background:#111;
  font-size:30px;
  display:flex;
  align-items:center;
  overflow:hidden;
}

#ticker span {
  white-space:nowrap;
  animation: scroll 25s linear infinite;
}

@keyframes scroll {
  from { transform:translateX(100%); }
  to { transform:translateX(-100%); }
}
</style>
</head>

<body>

<div id="topbar">
  <div id="clock"></div>
  <div>Fælleshuset</div>
</div>

<div id="video" style="width:100%;height:85vh;display:flex;align-items:center;justify-content:center;background:black;">
  <button onclick="startVideo()" style="font-size:30px;padding:20px;">▶ Start TV</button>
</div>

<div id="ticker">
  <span>Velkommen til fælleshuset – det virker nu 🎉</span>
</div>

<script>
setInterval(() => {
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString("da-DK") + " | " +
    now.toLocaleDateString("da-DK");
}, 1000);
</script>

</body>
</html>
<script>
function startVideo() {
  document.getElementById("video").innerHTML =
    '<iframe width="100%" height="100%" src="https://www.youtube.com/embed/ScMzIvxBSi4?autoplay=1&mute=0&playsinline=1" frameborder="0" allowfullscreen></iframe>';
}
</script>
